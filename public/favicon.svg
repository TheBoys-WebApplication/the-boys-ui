  <!-- Compass ticks -->
  <line x1="32" y1="6" x2="32" y2="10" stroke="#F97316" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="54" x2="32" y2="58" stroke="#F97316" stroke-width="2" stroke-linecap="round"/>
  <line x1="6" y1="32" x2="10" y2="32" stroke="#F97316" stroke-width="2" stroke-linecap="round"/>
  <line x1="54" y1="32" x2="58" y2="32" stroke="#F97316" stroke-width="2" stroke-linecap="round"/>
</svg>
