  <!-- Compass outer ring -->
  <circle cx="32" cy="32" r="26" fill="none" stroke="#F97316" stroke-width="2.5"/>
  <!-- Inner fill -->
  <circle cx="32" cy="32" r="20" fill="#0F0F1E"/>

  <!-- Mountain -->
